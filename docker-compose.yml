services:
  db:
    image: postgres:16
    container_name: frc_parts_db
    environment:
      POSTGRES_DB: frc_parts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frc_parts"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: frc_parts_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/frc_parts?schema=public
      APP_MODE: demo
      MAX_UPLOAD_MB: 10
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/uploads:/app/public/uploads
    # scripts/dev.mjs detects /.dockerenv and skips Docker management automatically
    command: sh -c "npm install && npm run dev"

volumes:
  db_data:
