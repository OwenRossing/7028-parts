services:
  db:
    image: postgres:16
    container_name: frc_parts_v2_db
    environment:
      POSTGRES_DB: frc_parts_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frc_parts_v2"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  db_data:
